<!DOCTYPE html>
<html>
<head>
  <title>Simple % Calculator</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f2f2f2;
      font-family: Arial;
    }

    .calculator {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      width: 220px;
    }

    #display {
      width: 100%;
      height: 40px;
      margin-bottom: 10px;
      font-size: 20px;
      text-align: right;
      padding: 5px;
      border: none;
      border-radius: 5px;
    }

    button {
      width: 48px;
      height: 40px;
      margin: 2px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .operator {
      background: orange;
      color: white;
    }

    .equal {
      background: green;
      color: white;
      width: 100%;
    }
  </style>
</head>
<body>

<div class="calculator">
  <input type="text" id="display" readonly>

  <div>
    <button onclick="press(7)">7</button>
    <button onclick="press(8)">8</button>
    <button onclick="press(9)">9</button>
    <button class="operator" onclick="setOperator('%')">%</button>
  </div>

  <div>
    <button onclick="press(4)">4</button>
    <button onclick="press(5)">5</button>
    <button onclick="press(6)">6</button>
  </div>

  <div>
    <button onclick="press(1)">1</button>
    <button onclick="press(2)">2</button>
    <button onclick="press(3)">3</button>
  </div>

  <div>
    <button onclick="press(0)">0</button>
    <button onclick="clearDisplay()">C</button>
  </div>

  <button class="equal" onclick="calculate()">=</button>
</div>

<script>
  let firstValue = null;
  let operator = null;

  function press(num) {
    document.getElementById("display").value += num;
  }

  function setOperator(op) {
    firstValue = parseFloat(document.getElementById("display").value);
    operator = op;
    document.getElementById("display").value = "";
  }

  function calculate() {
    let secondValue = parseFloat(document.getElementById("display").value);

    if (operator === '%') {
      // Percentage logic: (firstValue * secondValue) / 100
      let result = (firstValue * secondValue) / 100;
      document.getElementById("display").value = result;
    }
  }

  function clearDisplay() {
    document.getElementById("display").value = "";
    firstValue = null;
    operator = null;
  }
</script>

</body>
</html>
