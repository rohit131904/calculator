<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
  
      font-family: Arial, sans-serif;
    }

    .calculator {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 20px;
      width: 280px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .display {
      width: 100%;
      height: 70px;
      border: none;
      border-radius: 12px;
      margin-bottom: 15px;
      padding: 15px;
      font-size: 28px;
      text-align: right;
      background: #2a2a2a;
      color: #fff;
      outline: none;
      font-family: Arial, sans-serif;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      height: 60px;
      border: none;
      border-radius: 12px;
      font-size: 20px;
      cursor: pointer;
      background: #3a3a3a;
      color: white;
      transition: background 0.2s, transform 0.1s;
      font-family: Arial, sans-serif;
    }

    button:hover  { background: #505050; }
    button:active { transform: scale(0.95); }

    .operator       { background: #ff9f0a; }
    .operator:hover { background: #e68a00; }

    .clear          { background: #ff3b30; }
    .clear:hover    { background: #d63027; }

    .equal          { background: #28a745; grid-column: span 2; }
    .equal:hover    { background: #218838; }

    .zero           { grid-column: span 2; }
  </style>
</head>
<body>

  <div class="calculator">
    <input type="text" id="display" class="display" readonly value="0">

    <div class="buttons">
      <!-- Row 1 -->
      <button class="clear"    data-value="C">C</button>
      <button class="operator" data-value="%">%</button>
      <button class="operator" data-value="/">÷</button>
      <button class="operator" data-value="*">×</button>
      <button data-value=".">.</button>

      <!-- Row 2 -->
      <button data-value="7">7</button>
      <button data-value="8">8</button>
      <button data-value="9">9</button>
      <button class="operator" data-value="-">−</button>

      <!-- Row 3 -->
      <button data-value="4">4</button>
      <button data-value="5">5</button>
      <button data-value="6">6</button>
      <button class="operator" data-value="+">+</button>

      <!-- Row 4 -->
      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button class="equal"    data-value="=">=</button>

      <!-- Row 5 -->
      <button class="zero" data-value="0">0</button>
      
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
